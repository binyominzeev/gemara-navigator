<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gemara Navigator</title>
  <script>
    // GitHub Pages SPA redirect: preserve the path so the app can restore state.
    // Paths under /tursa/* are redirected to /tursa; all others go to the app root /.
    var path = window.location.pathname;
    sessionStorage.setItem('redirect', path);
    if (path.startsWith('/tursa')) {
      window.location.replace('/tursa');
    } else {
      window.location.replace('/');
    }
  </script>
</head>
<body></body>
</html>
