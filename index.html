<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="google-site-verification" content="cSHUxwVTdgNyWpj4vM4HYnN2LjjnhbwHh8IGaxc1yRI" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gemara Navigator</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f5f0;
      --surface: #ffffff;
      --ink: #1a1814;
      --ink-muted: #7a756c;
      --accent: #2a5f4f;
      --accent-light: #e8f0ed;
      --accent-hover: #1e4739;
      --border: #e2ddd6;
      --radius: 6px;
      --transition: 180ms ease;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      padding: 48px 24px 80px;
    }

    .container {
      max-width: 860px;
      margin: 0 auto;
    }

    /* Header */
    header {
      margin-bottom: 52px;
      display: flex;
      align-items: baseline;
      gap: 16px;
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      color: var(--ink);
      line-height: 1;
    }

    .subtitle {
      font-size: 13px;
      color: var(--ink-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 300;
    }

    /* Breadcrumb */
    #breadcrumb {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--ink-muted);
      margin-bottom: 32px;
      min-height: 20px;
      font-weight: 300;
    }

    #breadcrumb span { color: var(--ink); font-weight: 500; }
    #breadcrumb .sep { color: var(--border); }

    /* Section labels */
    .section-label {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-muted);
      font-weight: 500;
      margin-bottom: 12px;
    }

    /* Divider between sections */
    .section-divider {
      width: 100%;
      height: 1px;
      background: var(--border);
      margin: 32px 0;
    }

    /* Button grids */
    .grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    /* === SEDER BUTTONS — pill style, prominent === */
    #seder-container .button {
      font-family: 'DM Serif Display', serif;
      font-size: 15px;
      font-weight: 400;
      letter-spacing: 0.01em;
      padding: 10px 22px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 100px;
      cursor: pointer;
      color: var(--ink);
      transition: background var(--transition), border-color var(--transition), color var(--transition), transform var(--transition);
      white-space: nowrap;
    }

    #seder-container .button:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-light);
      transform: translateY(-1px);
    }

    #seder-container .button.selected {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      font-style: italic;
    }

    /* === MASECHES BUTTONS — outlined chips === */
    #maseches-container .button {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      padding: 8px 16px;
      background: transparent;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      color: var(--ink);
      transition: background var(--transition), border-color var(--transition), color var(--transition);
      white-space: nowrap;
    }

    #maseches-container .button:hover {
      border-color: var(--accent);
      background: var(--accent-light);
      color: var(--accent);
    }

    #maseches-container .button.selected {
      background: var(--accent-light);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* === DAF BUTTONS — compact number grid === */
    #daf-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(68px, 1fr));
      gap: 6px;
    }

    #daf-container .button {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 400;
      padding: 9px 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      color: var(--ink-muted);
      transition: background var(--transition), border-color var(--transition), color var(--transition);
      text-align: center;
    }

    #daf-container .button:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-light);
    }

    #daf-container .button.selected {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      font-weight: 500;
    }

    /* === INTERFACE BUTTONS — full-width action list === */
    #interface-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 8px;
    }

    #interface-container .button {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      padding: 14px 16px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      color: var(--ink);
      text-align: left;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: background var(--transition), border-color var(--transition), color var(--transition), transform var(--transition);
    }

    #interface-container .button::before {
      content: '↗';
      font-size: 15px;
      color: var(--accent);
      flex-shrink: 0;
    }

    #interface-container .button:hover {
      border-color: var(--accent);
      background: var(--accent-light);
      color: var(--accent);
      transform: translateY(-1px);
    }

    .hidden { display: none !important; }

    /* Fade-in animation */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .animate-in {
      animation: fadeUp 220ms ease both;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Gemara Navigator</h1>
      <span class="subtitle">Talmud Bavli</span>
    </header>

    <div id="breadcrumb"></div>

    <div class="section-label">Seder</div>
    <div id="seder-container" class="grid">
      <button class="button" onclick="selectSeder('Zeraim', this)">Zeraim</button>
      <button class="button" onclick="selectSeder('Moed', this)">Moed</button>
      <button class="button" onclick="selectSeder('Nashim', this)">Nashim</button>
      <button class="button" onclick="selectSeder('Nezikin', this)">Nezikin</button>
      <button class="button" onclick="selectSeder('Kodashim', this)">Kodashim</button>
      <button class="button" onclick="selectSeder('Taharos', this)">Taharos</button>
    </div>

    <div id="maseches-section" class="hidden">
      <div class="section-divider"></div>
      <div class="section-label">Maseches</div>
      <div id="maseches-container" class="grid"></div>
    </div>

    <div id="daf-section" class="hidden">
      <div class="section-divider"></div>
      <div class="section-label">Daf</div>
      <div id="daf-container"></div>
    </div>

    <div id="interface-section" class="hidden">
      <div class="section-divider"></div>
      <div class="section-label">Open in</div>
      <div id="interface-container">
        <button class="button">TorahApp</button>
        <button class="button">Sefaria</button>
        <button class="button">Torat Emet</button>
        <button class="button">Shas Vilna</button>
        <button class="button">Dafyomi Outline</button>
      </div>
    </div>
  </div>

  <script>
    const masechtot = {
      Zeraim: [{ title: 'Berachot', dapim: 64 }],
      Moed: [
        { title: 'Shabbat', dapim: 157 }, { title: 'Eruvin', dapim: 105 },
        { title: 'Pesachim', dapim: 121 }, { title: 'Shekalim', dapim: 22 },
        { title: 'Yoma', dapim: 88 }, { title: 'Sukkah', dapim: 56 },
        { title: 'Beitzah', dapim: 40 }, { title: 'Rosh Hashanah', dapim: 35 },
        { title: 'Taanit', dapim: 31 }, { title: 'Megillah', dapim: 32 },
        { title: 'Moed Katan', dapim: 29 }, { title: 'Chagigah', dapim: 27 }
      ],
      Nashim: [
        { title: 'Yevamot', dapim: 122 }, { title: 'Ketubot', dapim: 112 },
        { title: 'Nedarim', dapim: 91 }, { title: 'Nazir', dapim: 66 },
        { title: 'Sotah', dapim: 49 }, { title: 'Gittin', dapim: 90 },
        { title: 'Kiddushin', dapim: 82 }
      ],
      Nezikin: [
        { title: 'Bava Kama', dapim: 119 }, { title: 'Bava Metzia', dapim: 119 },
        { title: 'Bava Batra', dapim: 176 }, { title: 'Sanhedrin', dapim: 113 },
        { title: 'Makkot', dapim: 24 }, { title: 'Shevuot', dapim: 49 },
        { title: 'Avodah Zarah', dapim: 76 }, { title: 'Horayot', dapim: 14 }
      ],
      Kodashim: [
        { title: 'Zevachim', dapim: 120 }, { title: 'Menachot', dapim: 110 },
        { title: 'Chullin', dapim: 142 }, { title: 'Bechorot', dapim: 61 },
        { title: 'Arachin', dapim: 34 }, { title: 'Temurah', dapim: 34 },
        { title: 'Keritot', dapim: 28 }, { title: 'Meilah', dapim: 22 },
        { title: 'Kinim', dapim: 3 }, { title: 'Tamid', dapim: 10 },
        { title: 'Middot', dapim: 4 }
      ],
      Taharos: [{ title: 'Niddah', dapim: 73 }]
    };

    const dafyomiShortcodes = {
      Berachot:'br',Shabbat:'sh',Eruvin:'ev',Pesachim:'ps',Shekalim:'sk',Yoma:'yo',
      Sukkah:'su',Beitzah:'bt',Rosh_Hashanah:'rh',Taanit:'tn',Megillah:'mg',
      Moed_Katan:'mo',Chagigah:'cg',Yevamot:'ye',Ketubot:'ks',Nedarim:'nd',
      Nazir:'nz',Sotah:'so',Gittin:'gi',Kiddushin:'kd',Bava_Kama:'bk',
      Bava_Metzia:'bm',Bava_Batra:'bb',Sanhedrin:'sn',Makkot:'ma',Shevuot:'sv',
      Avodah_Zarah:'az',Eduyot:'ed',Avot:'av',Horayot:'ho',Zevachim:'zv',
      Menachot:'mn',Chullin:'ch',Bechorot:'be',Arachin:'er',Temurah:'tm',
      Keritot:'kr',Meilah:'ml',Tamid:'ml',Middot:'ml',Kinim:'ml',Niddah:'ni'
    };

    const dafyomiAltNames = {
      Berachot:'berachos',Shabbat:'shabbos',Taanit:'taanis',Sukkah:'sukah',
      "Rosh Hashanah":'rhashanah',"Moed Katan":'mkatan',Megillah:'megilah',
      Gittin:'gitin',Yevamot:'yevamos',Ketubot:'kesuvos',"Bava Kama":'bkama',
      "Bava Metzia":'bmetzia',"Bava Batra":'bbasra',"Avodah Zarah":'azarah',
      Kiddushin:'kidushin',Makkot:'makos',Shevuot:'shevuos',Horayot:'horayos',
      Menachot:'menachos',Bechorot:'bechoros',Arachin:'erchin',Chullin:'chulin',
      Keritot:'kerisus',Middot:'midos',Niddah:'nidah'
    };

    const toratEmetIDs = {
      Berachot:'00841',Shabbat:'00844',Eruvin:'00847',Pesachim:'00908',Shekalim:'00850',
      Yoma:'00853',Sukkah:'00875',Beitzah:'00859',"Rosh Hashanah":'01106',
      Taanit:'00888',Megillah:'00862',Moed_Katan:'00892',Chagigah:'01136',
      Yevamot:'00868',Ketubot:'00920',Nedarim:'00895',Nazir:'00903',Sotah:'00928',
      Gittin:'00934',Kiddushin:'00899',"Bava Kama":'00997',"Bava Metzia":'00959',
      "Bava Batra":'00948',Sanhedrin:'01003',Makkot:'01007',Shevuot:'01014',
      "Avodah Zarah":'01022',Horayot:'01027',Zevachim:'01030',Menachot:'01040',
      Chullin:'01045',Bechorot:'01132',Arachin:'01060',Temurah:'01035',
      Keritot:'01121',Meilah:'01117',Tamid:'01378',Niddah:'01056'
    };

    const shasVilnaBaseID = 283;
    const customShasVilnaRanges = {
      Kinim:{ startAmud:43, masechetOffset:36 },
      Tamid:{ startAmud:50, masechetOffset:37 },
      Middot:{ startAmud:67, masechetOffset:38 }
    };
    const customDafRanges = {
      Kinim:{ start:22, end:25 },
      Tamid:{ start:25, end:33 },
      Middot:{ start:34, end:37 }
    };

    // State
    let state = { seder: null, maseches: null, daf: null };

    // --- URL routing helpers ---

    function masechesToURL(title) {
      return title.replace(/ /g, '_');
    }

    function urlToMaseches(urlPart) {
      return urlPart.replace(/_/g, ' ');
    }

    function getSederForMaseches(title) {
      for (const [seder, list] of Object.entries(masechtot)) {
        if (list.some(m => m.title === title)) return seder;
      }
      return null;
    }

    function restoreFromPath(path) {
      const parts = path.split('/').filter(Boolean);
      if (parts.length === 0) return;

      const masechesTitle = urlToMaseches(decodeURIComponent(parts[0]));
      const daf = parts[1] ? parseInt(parts[1], 10) : null;

      const seder = getSederForMaseches(masechesTitle);
      if (!seder) return;

      const masechesObj = masechtot[seder].find(m => m.title === masechesTitle);
      if (!masechesObj) return;

      const sederBtn = Array.from(document.querySelectorAll('#seder-container .button'))
        .find(b => b.textContent === seder);
      if (!sederBtn) return;
      selectSeder(seder, sederBtn, false);

      const masechesBtn = Array.from(document.querySelectorAll('#maseches-container .button'))
        .find(b => b.textContent === masechesTitle);
      if (!masechesBtn) return;
      selectMaseches(masechesObj, masechesBtn, false);

      if (daf !== null && !isNaN(daf)) {
        const dafBtn = Array.from(document.querySelectorAll('#daf-container .button'))
          .find(b => parseInt(b.textContent, 10) === daf);
        if (dafBtn) selectDaf(masechesTitle, daf, dafBtn, false);
      }
    }

    window.addEventListener('popstate', () => {
      // Reset UI and restore from the URL the browser navigated to
      state = { seder: null, maseches: null, daf: null };
      document.querySelectorAll('#seder-container .button').forEach(b => b.classList.remove('selected'));
      document.getElementById('maseches-section').classList.add('hidden');
      document.getElementById('daf-section').classList.add('hidden');
      document.getElementById('interface-section').classList.add('hidden');
      document.getElementById('breadcrumb').innerHTML = '';
      restoreFromPath(window.location.pathname);
    });

    // --- end URL routing helpers ---

    function updateBreadcrumb() {
      const bc = document.getElementById('breadcrumb');
      const parts = [];
      if (state.seder) parts.push(`<span>${state.seder}</span>`);
      if (state.maseches) { parts.push('<span class="sep">›</span>'); parts.push(`<span>${state.maseches}</span>`); }
      if (state.daf) { parts.push('<span class="sep">›</span>'); parts.push(`<span>Daf ${state.daf}</span>`); }
      bc.innerHTML = parts.join(' ');
    }

    function animateSection(el) {
      el.classList.remove('animate-in');
      void el.offsetWidth;
      el.classList.add('animate-in');
    }

    function setSelected(container, clickedBtn) {
      container.querySelectorAll('.button').forEach(b => b.classList.remove('selected'));
      clickedBtn.classList.add('selected');
    }

    function selectSeder(seder, btn, updateUrl = true) {
      state = { seder, maseches: null, daf: null };
      updateBreadcrumb();
      if (updateUrl) history.pushState(null, '', '/');
      setSelected(document.getElementById('seder-container'), btn);

      const masechesContainer = document.getElementById('maseches-container');
      masechesContainer.innerHTML = '';

      masechtot[seder].forEach(m => {
        const b = document.createElement('button');
        b.className = 'button';
        b.textContent = m.title;
        b.onclick = () => selectMaseches(m, b);
        masechesContainer.appendChild(b);
      });

      const sec = document.getElementById('maseches-section');
      sec.classList.remove('hidden');
      animateSection(masechesContainer);

      document.getElementById('daf-section').classList.add('hidden');
      document.getElementById('interface-section').classList.add('hidden');
    }

    function selectMaseches(maseches, btn, updateUrl = true) {
      state.maseches = maseches.title;
      state.daf = null;
      updateBreadcrumb();
      if (updateUrl) history.pushState(null, '', `/${masechesToURL(maseches.title)}`);
      setSelected(document.getElementById('maseches-container'), btn);

      const dafContainer = document.getElementById('daf-container');
      dafContainer.innerHTML = '';

      const { start, end } = customDafRanges[maseches.title] || { start: 2, end: maseches.dapim };
      for (let i = start; i <= end; i++) {
        const b = document.createElement('button');
        b.className = 'button';
        b.textContent = `${i}`;
        b.onclick = () => selectDaf(maseches.title, i, b);
        dafContainer.appendChild(b);
      }

      const sec = document.getElementById('daf-section');
      sec.classList.remove('hidden');
      animateSection(dafContainer);

      document.getElementById('interface-section').classList.add('hidden');
    }

    function selectDaf(maseches, daf, btn, updateUrl = true) {
      state.daf = daf;
      updateBreadcrumb();
      if (updateUrl) history.pushState(null, '', `/${masechesToURL(maseches)}/${daf}`);
      setSelected(document.getElementById('daf-container'), btn);

      const ifContainer = document.getElementById('interface-container');
      ifContainer.querySelectorAll('.button').forEach(b => {
        b.onclick = () => redirectTo(b.textContent.trim(), maseches, daf);
      });

      const sec = document.getElementById('interface-section');
      sec.classList.remove('hidden');
      animateSection(ifContainer);
    }

    function getToratEmetAnchor(daf) {
      const offset = (daf - 2) * 2;
      return `HtmpReportNum${String(offset).padStart(4,'0')}_L2`;
    }

    function getShasVilnaURL(maseches, daf) {
      const masechesIndex = Object.keys(toratEmetIDs).indexOf(maseches);
      if (customShasVilnaRanges[maseches]) {
        const { start } = customDafRanges[maseches];
        const { startAmud, masechetOffset } = customShasVilnaRanges[maseches];
        const massechet = shasVilnaBaseID + masechetOffset;
        const amud = startAmud + (daf - start) * 2;
        return `https://daf-yomi.com/Dafyomi_Page.aspx?vt=1&massechet=${massechet}&amud=${amud}&fs=0`;
      }
      if (masechesIndex === -1) { alert(`Shas Vilna ID not found for ${maseches}.`); return null; }
      if (maseches === 'Niddah') {
        return `https://daf-yomi.com/Dafyomi_Page.aspx?vt=1&massechet=322&amud=${(daf-2)*2+3}&fs=0`;
      }
      const massechet = shasVilnaBaseID + masechesIndex;
      const amud = (daf - 2) * 2 + 3;
      return `https://daf-yomi.com/Dafyomi_Page.aspx?vt=1&massechet=${massechet}&amud=${amud}&fs=0`;
    }

    function redirectTo(iface, maseches, daf) {
      let url = '';
      switch (iface) {
        case 'Sefaria':
          url = `https://www.sefaria.org/${maseches}.${daf}a`; break;
        case 'TorahApp':
          url = `https://torahapp.org/share/book/${maseches}/r/${daf}a`; break;
        case 'Torat Emet': {
          const id = toratEmetIDs[maseches];
          if (!id) { alert(`Torat Emet ID not found for ${maseches}.`); return; }
          url = `http://www.toratemetfreeware.com/online/f_${id}.html#${getToratEmetAnchor(daf)}`; break;
        }
        case 'Shas Vilna':
          url = getShasVilnaURL(maseches, daf);
          if (!url) return; break;
        case 'Dafyomi Outline': {
          const altName = dafyomiAltNames[maseches] || maseches.toLowerCase();
          const shortcode = dafyomiShortcodes[maseches.replace(/ /g,'_')];
          if (!shortcode) { alert('Shortcode not found.'); return; }
          url = `https://dafyomi.co.il/${altName}/points/${shortcode}-ps-${String(daf).padStart(3,'0')}.htm`; break;
        }
        default: alert('Invalid interface.'); return;
      }
      window.open(url, '_blank');
    }

    // Restore selection state from URL on initial page load.
    // When arriving via the 404.html redirect, the original path is in sessionStorage.
    document.addEventListener('DOMContentLoaded', () => {
      const redirectPath = sessionStorage.getItem('redirect');
      if (redirectPath) {
        sessionStorage.removeItem('redirect');
        // Validate: only accept paths that look like /Maseches or /Maseches/Daf
        if (/^\/[A-Za-z_]+(\/\d+)?$/.test(redirectPath)) {
          history.replaceState(null, '', redirectPath);
        }
      }
      restoreFromPath(window.location.pathname);
    });
  </script>
</body>
</html>
