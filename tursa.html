<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shulchan Aruch Navigator</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f5f0;
      --surface: #ffffff;
      --ink: #1a1814;
      --ink-muted: #7a756c;
      --accent: #7a2e3c;
      --accent-light: #f5ebed;
      --accent-hover: #5a1e2c;
      --border: #e2ddd6;
      --radius: 6px;
      --transition: 180ms ease;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      padding: 48px 24px 80px;
    }

    .container {
      max-width: 860px;
      margin: 0 auto;
    }

    /* Header */
    header {
      margin-bottom: 52px;
      display: flex;
      align-items: baseline;
      gap: 16px;
      flex-wrap: wrap;
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      color: var(--ink);
      line-height: 1;
    }

    h1 a {
      color: inherit;
      text-decoration: none;
    }

    .subtitle {
      font-size: 13px;
      color: var(--ink-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 300;
    }

    .sibling-link {
      margin-left: auto;
      font-size: 13px;
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
      white-space: nowrap;
      transition: color var(--transition);
      align-self: center;
    }

    .sibling-link:hover {
      color: var(--accent-hover);
    }

    /* Breadcrumb */
    #breadcrumb {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--ink-muted);
      margin-bottom: 32px;
      min-height: 20px;
      font-weight: 300;
    }

    #breadcrumb span { color: var(--ink); font-weight: 500; }
    #breadcrumb .sep { color: var(--border); }

    /* Section labels */
    .section-label {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-muted);
      font-weight: 500;
      margin-bottom: 12px;
    }

    /* Divider between sections */
    .section-divider {
      width: 100%;
      height: 1px;
      background: var(--border);
      margin: 32px 0;
    }

    /* Button grids */
    .grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    /* === CHELEK BUTTONS — pill style, prominent === */
    #chelek-container .button {
      font-family: 'DM Serif Display', serif;
      font-size: 15px;
      font-weight: 400;
      letter-spacing: 0.01em;
      padding: 10px 22px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 100px;
      cursor: pointer;
      color: var(--ink);
      transition: background var(--transition), border-color var(--transition), color var(--transition), transform var(--transition);
      white-space: nowrap;
    }

    #chelek-container .button:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-light);
      transform: translateY(-1px);
    }

    #chelek-container .button.selected {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      font-style: italic;
    }

    /* === SIMAN BUTTONS — compact number grid === */
    #siman-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(68px, 1fr));
      gap: 6px;
    }

    #siman-container .button {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 400;
      padding: 9px 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      color: var(--ink-muted);
      transition: background var(--transition), border-color var(--transition), color var(--transition);
      text-align: center;
    }

    #siman-container .button:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-light);
    }

    #siman-container .button.selected {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      font-weight: 500;
    }

    /* === ENDPOINT BUTTONS — full-width action list === */
    #endpoint-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 8px;
    }

    #endpoint-container .button {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      padding: 14px 16px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      color: var(--ink);
      text-align: left;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: background var(--transition), border-color var(--transition), color var(--transition), transform var(--transition);
    }

    #endpoint-container .button::before {
      content: '↗';
      font-size: 15px;
      color: var(--accent);
      flex-shrink: 0;
    }

    #endpoint-container .button:hover {
      border-color: var(--accent);
      background: var(--accent-light);
      color: var(--accent);
      transform: translateY(-1px);
    }

    .hidden { display: none !important; }

    /* Fade-in animation */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .animate-in {
      animation: fadeUp 220ms ease both;
    }

    /* Footer */
    footer {
      margin-top: 52px;
      padding-top: 32px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--ink-muted);
      display: flex;
      gap: 24px;
      justify-content: center;
      flex-wrap: wrap;
    }

    footer a {
      color: var(--accent);
      text-decoration: none;
      transition: color var(--transition);
    }

    footer a:hover {
      color: var(--accent-hover);
    }
  </style>
</head>

      };
      return map[name] || name.replace(/ /g, '_');
    }

    function urlToChelek(urlPart) {
      const map = {
        'Orach_Chaim':    'Orach Chaim',
        'Yoreh_Deah':     "Yoreh De'ah",
        'Even_HaEzer':    "Even Ha'ezer",
        'Choshen_Mishpat':'Choshen Mishpat'
      };
      return map[urlPart] || null;
    }

    function restoreFromPath(path) {
      // Strip leading /tursa prefix if present
      const parts = path.replace(/^\/tursa\/?/, '').split('/').filter(Boolean);
      if (parts.length === 0) return;

      const chelekName = urlToChelek(parts[0]);
      if (!chelekName || !samap[chelekName]) return;

      const chelekBtn = Array.from(document.querySelectorAll('#chelek-container .button'))
        .find(b => b.dataset.chelek === chelekName);
      if (!chelekBtn) return;
      selectChelek(chelekName, chelekBtn, false);

      if (parts[1]) {
        const siman = parseInt(parts[1], 10);
        if (!isNaN(siman) && siman >= 1 && siman <= samap[chelekName].count) {
          const simanBtn = Array.from(document.querySelectorAll('#siman-container .button'))
            .find(b => parseInt(b.textContent, 10) === siman);
          if (simanBtn) selectSiman(chelekName, siman, simanBtn, false);
        }
      }
    }

    window.addEventListener('popstate', () => {
      state = { chelek: null, siman: null };
      document.querySelectorAll('#chelek-container .button').forEach(b => b.classList.remove('selected'));
      document.getElementById('siman-section').classList.add('hidden');
      document.getElementById('endpoint-section').classList.add('hidden');
      document.getElementById('breadcrumb').innerHTML = '';
      restoreFromPath(window.location.pathname);
    });

    // --- end URL routing helpers ---

    function updateBreadcrumb() {
      const bc = document.getElementById('breadcrumb');
      const parts = [];
      if (state.chelek) parts.push(`<span>${state.chelek}</span>`);
      if (state.siman) { parts.push('<span class="sep">›</span>'); parts.push(`<span>Siman ${state.siman}</span>`); }
      bc.innerHTML = parts.join(' ');
    }

    function animateSection(el) {
      el.classList.remove('animate-in');
      void el.offsetWidth;
      el.classList.add('animate-in');
    }

    function setSelected(container, clickedBtn) {
      container.querySelectorAll('.button').forEach(b => b.classList.remove('selected'));
      clickedBtn.classList.add('selected');
    }

    function selectChelek(chelek, btn, updateUrl = true) {
      state = { chelek, siman: null };
      updateBreadcrumb();
      if (updateUrl) history.pushState(null, '', '/tursa');
      setSelected(document.getElementById('chelek-container'), btn);

      const simanContainer = document.getElementById('siman-container');
      simanContainer.innerHTML = '';

      const count = samap[chelek].count;
      for (let i = 1; i <= count; i++) {
        const b = document.createElement('button');
        b.className = 'button';
        b.textContent = `${i}`;
        b.onclick = () => selectSiman(chelek, i, b);
        simanContainer.appendChild(b);
      }

      const sec = document.getElementById('siman-section');
      sec.classList.remove('hidden');
      animateSection(simanContainer);

      document.getElementById('endpoint-section').classList.add('hidden');
    }

    function selectSiman(chelek, siman, btn, updateUrl = true) {
      state.siman = siman;
      updateBreadcrumb();
      if (updateUrl) history.pushState(null, '', `/tursa/${chelekToURL(chelek)}/${siman}`);
      setSelected(document.getElementById('siman-container'), btn);

      const epContainer = document.getElementById('endpoint-container');
      epContainer.querySelectorAll('.button').forEach(b => {
        b.onclick = () => openTursa(b.textContent.trim(), chelek, siman);
      });

      const sec = document.getElementById('endpoint-section');
      sec.classList.remove('hidden');
      animateSection(epContainer);
    }

    const sefariaChelekMap = {
      'Orach Chaim':    'Orach_Chayim',
      "Yoreh De'ah":    "Yoreh_De'ah",
      "Even Ha'ezer":   'Even_HaEzer',
      'Choshen Mishpat':'Choshen_Mishpat'
    };

    function openTursa(endpoint, chelek, siman) {
      let url;
      if (endpoint === 'Tur (Sefaria)' || endpoint === 'Shulchan Aruch (Sefaria)') {
        const sc = sefariaChelekMap[chelek];
        if (!sc) { alert('Unknown chelek.'); return; }
        const work = endpoint === 'Tur (Sefaria)' ? 'Tur' : 'Shulchan_Arukh';
        url = `https://www.sefaria.org/${work}%2C_${sc}.${siman}?lang=bi`;
      } else {
        const info = samap[chelek];
        if (!info) { alert('Unknown chelek.'); return; }
        const pageId = info.ids[siman - 1];
        if (!pageId) { alert('Page ID not found for this siman.'); return; }
        url = `https://beta.hebrewbooks.org/tursa.aspx?a=${info.key}_x${pageId}`;
      }
      window.open(url, '_blank');
    }

    // Restore selection state from URL on initial page load.
    // When arriving via the 404.html redirect, the original path is in sessionStorage.
    document.addEventListener('DOMContentLoaded', () => {
      const redirectPath = sessionStorage.getItem('redirect');
      if (redirectPath) {
        sessionStorage.removeItem('redirect');
        if (/^\/tursa(\/[A-Za-z_]+(\/\d+)?)?$/.test(redirectPath)) {
          history.replaceState(null, '', redirectPath);
        }
      }
      restoreFromPath(window.location.pathname);
    });
  </script>
</body>
</html>
